# GitHub Actions CI/CD Pipeline for Test Execution
# Generated by BMad TEA Agent - Test Architect Module
# Stack: backend | Framework: pytest
#
# Secrets/vars required: none (add SLACK_WEBHOOK_URL to enable failure notifications)

name: Test Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Weekly run on Sundays at 2 AM UTC
    - cron: "0 2 * * 0"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"
          # Falls back to latest stable if .python-version is absent
          python-version: "3.x"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt', '**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install linting tools
        run: pip install ruff

      - name: Run linter
        run: ruff check .

  # ─── Test (parallel shards) ───────────────────────────────────────────────────
  test:
    name: Test (Shard ${{ matrix.shard }}/4)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"
          python-version: "3.x"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt', '**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          pip install pytest pytest-cov pytest-split

      - name: Run tests (shard ${{ matrix.shard }}/4)
        run: |
          pytest _bmad/scripts/tests/ \
            --splits 4 \
            --group ${{ matrix.shard }} \
            --cov=_bmad/scripts \
            --cov-report=xml:coverage-${{ matrix.shard }}.xml \
            --junitxml=junit-${{ matrix.shard }}.xml \
            -v

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-shard-${{ matrix.shard }}
          path: |
            junit-${{ matrix.shard }}.xml
            coverage-${{ matrix.shard }}.xml
          retention-days: 30

  # ─── Report ───────────────────────────────────────────────────────────────────
  report:
    name: Test Report
    runs-on: ubuntu-latest
    needs: [test]
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Merge JUnit reports
        run: |
          pip install junitparser
          python - <<'EOF'
          from junitparser import JUnitXml, TestSuite
          import glob, sys

          xml_files = glob.glob("artifacts/**/junit-*.xml", recursive=True)
          if not xml_files:
              print("No JUnit files found — skipping merge")
              sys.exit(0)

          merged = JUnitXml()
          for f in xml_files:
              merged += JUnitXml.fromfile(f)
          merged.write("junit-merged.xml")
          print(f"Merged {len(xml_files)} shard report(s)")
          EOF

      - name: Publish test summary
        run: |
          echo "## Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Stack | Backend (Python / pytest) |" >> $GITHUB_STEP_SUMMARY
          echo "| Shards | 4 |" >> $GITHUB_STEP_SUMMARY
          echo "| Test result | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "> **Tests failed** — download shard artifacts for details." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload merged report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-merged
          path: junit-merged.xml
          retention-days: 30

      # ── Quality gate (P1 threshold) ───────────────────────────────────────────
      - name: Enforce quality gate
        if: needs.test.result == 'failure'
        run: |
          echo "Quality gate FAILED: test shards reported failures."
          echo "P0 tests must pass at 100%, P1 tests at ≥95%."
          exit 1

